<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Healins - QR Access</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Manrope:wght@600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-container": "#90a8ff",
                        "inverse-on-surface": "#f1f0f7",
                        "on-background": "#1a1b21",
                        "on-primary": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#dad9e1",
                        "surface-container-low": "#f4f3fa",
                        "secondary-container": "#6cf8bb",
                        "secondary-fixed-dim": "#4edea3",
                        "tertiary": "#5c0008",
                        "on-primary-fixed": "#00164e",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#005236",
                        "on-secondary-container": "#00714d",
                        "secondary": "#006c49",
                        "surface-container": "#eeedf4",
                        "surface-variant": "#e3e1e9",
                        "surface-bright": "#faf8ff",
                        "outline-variant": "#c5c5d3",
                        "on-tertiary-fixed-variant": "#930013",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-container": "#1e3a8a",
                        "on-surface-variant": "#444651",
                        "primary-fixed": "#dce1ff",
                        "on-tertiary-fixed": "#410004",
                        "inverse-primary": "#b6c4ff",
                        "surface-tint": "#4059aa",
                        "tertiary-fixed-dim": "#ffb3ad",
                        "inverse-surface": "#2f3036",
                        "surface-container-highest": "#e3e1e9",
                        "surface-container-high": "#e9e7ef",
                        "secondary-fixed": "#6ffbbe",
                        "tertiary-container": "#860011",
                        "tertiary-fixed": "#ffdad7",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#b6c4ff",
                        "on-surface": "#1a1b21",
                        "error": "#ba1a1a",
                        "on-tertiary-container": "#ff8a83",
                        "surface": "#faf8ff",
                        "outline": "#757682",
                        "on-error-container": "#93000a",
                        "primary": "#00236f",
                        "on-secondary-fixed": "#002113",
                        "background": "#faf8ff",
                        "on-primary-fixed-variant": "#264191"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-gradient {
            background: linear-gradient(135deg, #00236f 0%, #1e3a8a 100%);
        }
        .vitality-glow {
            background: radial-gradient(circle at 50% 50%, rgba(220, 225, 255, 0.4) 0%, rgba(250, 248, 255, 0) 70%);
        }
        .qr-scanner-line {
            height: 2px;
            background: #4059aa;
            width: 100%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 0 15px 2px #4059aa;
            opacity: 0.6;
            animation: scan 2.5s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 0; }
            50% { top: 100%; }
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 h-16 w-full max-w-screen-xl mx-auto">
<div class="text-2xl font-extrabold tracking-tighter text-blue-900 dark:text-blue-100">Healins</div>
<div class="flex items-center gap-4">
<button class="hover:bg-slate-200/50 dark:hover:bg-slate-800/50 transition-colors p-2 rounded-full">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-400" data-icon="account_circle">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-16 pb-32 vitality-glow flex items-center justify-center px-6">
<div class="w-full max-w-md space-y-8">
<!-- Header Editorial Section -->
<div class="text-center space-y-3">
<h1 class="font-headline font-extrabold text-3xl tracking-tight text-on-surface">Secure Records Access</h1>
<div class="space-y-2">
<p class="text-on-surface-variant font-medium leading-relaxed">Let your doctor scan to access your records</p>
<p class="text-xs text-on-surface-variant/70 max-w-[280px] mx-auto">Access is only granted with your approval. You will receive a notification to confirm the session.</p>
</div>
</div>
<!-- QR Hero Artifact -->
<div class="relative group">
<!-- Decorative Layering for Depth -->
<div class="absolute -inset-4 bg-primary-fixed/30 blur-3xl rounded-full opacity-50"></div>
<div class="relative bg-surface-container-lowest rounded-xl p-8 shadow-[0_40px_80px_rgba(26,27,33,0.04)] border border-outline-variant/15 flex flex-col items-center">
<!-- QR Code Container with Scanning Indicator -->
<div class="relative w-full aspect-square max-w-[280px] bg-white rounded-lg flex items-center justify-center overflow-hidden border border-surface-container-low">
<img alt="QR Code for secure medical access" class="w-full h-full p-4 opacity-90" data-alt="clean black and white minimalist QR code centered on a crisp white background with sharp edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCXaKRhpYxO9KLbQhwJje_PzZZEwmFKsmL8N8dobEdTpzZzX4NgQ4-1P-rj0_V1fhnSe6Ohy2fa9XwNgBQDw-vVxU8cf93aciu4rvpcPURSOWObN8XxL_hOpOp7J-Sf-L6MJAKUQ8yTIuP1yauQQWGhvq-77POnXd1E_6x2qeYK_6X0YNx7qutwuJfPkqbI96L0b6DCXO_7BWORloVr3sRBuotJycLhXeLwuzlztQVsGYV3gJO6ANJ1fO1s9P0wd3F6Aj4sZts-14s"/>
<!-- Scanning Animation Frame -->
<div class="absolute inset-4 pointer-events-none">
<div class="absolute top-0 left-0 w-8 h-8 border-t-2 border-l-2 border-primary rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-primary rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-2 border-l-2 border-primary rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-2 border-r-2 border-primary rounded-br-lg"></div>
<!-- Static Scanning Line (requested as indicator) -->
<div class="qr-scanner-line"></div>
</div>
</div>
<!-- Approval Badge -->
<div class="mt-8 flex items-center gap-2 px-4 py-2 bg-secondary-container/20 rounded-full border border-secondary/10">
<span class="material-symbols-outlined text-on-secondary-container text-lg" data-weight="fill" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="text-on-secondary-container font-label text-[10px] font-bold uppercase tracking-widest">Authorized Access Only</span>
</div>
</div>
</div>
<!-- Footer Messaging -->
<div class="text-center pt-2 flex flex-col gap-3">
<button class="editorial-gradient text-on-primary font-headline font-bold py-4 px-8 rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-all">
                    Generate New Code
                </button>
<button class="text-primary font-headline font-bold py-3 hover:underline text-sm">
                    Manual Entry Code
                </button>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-slate-50/80 dark:bg-slate-950/80 backdrop-blur-md z-50 border-t border-slate-200/20 shadow-[0_-4px_20px_rgba(26,27,33,0.04)]">
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-blue-800 dark:hover:text-blue-200" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-blue-800 dark:hover:text-blue-200" href="#">
<span class="material-symbols-outlined" data-icon="event_note">event_note</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">Timeline</span>
</a>
<a class="flex flex-col items-center justify-center bg-blue-100 dark:bg-blue-900/40 text-blue-900 dark:text-blue-100 rounded-2xl px-5 py-1.5 active:scale-90 transition-transform duration-200" href="#">
<span class="material-symbols-outlined" data-icon="qr_code_2">qr_code_2</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">Access</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 px-5 py-1.5 hover:text-blue-800 dark:hover:text-blue-200" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">Profile</span>
</a>
</nav>
</body></html>
